name: "Deploy Azure Static Web App"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Download build
      uses: actions/download-artifact@v4
      with:
        name: web-build
        path: dist

    - name: Download config
      uses: actions/download-artifact@v4
      with:
        name: static-web-app-json
        path: secret

    - name: Install SWA CLI
      run: npm install -g @azure/static-web-apps-cli
      shell: bash

    - name: Deploy
      run: |
        ENV_NAME=$([ "$GITHUB_REF_NAME" = "main" ] && echo "production" || echo "$GITHUB_REF_NAME")
        FILE_JSON="${{ inputs.config-path }}/static-web-app-json.json"
        API_KEY=$(jq -r '.properties.apiKey' $FILE_JSON)

        swa deploy ${{ inputs.artifact-path }} \
          --deployment-token $API_KEY \
          --env $ENV_NAME
      shell: bash