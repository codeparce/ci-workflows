name: Java setup

runs:
  using: "composite"
  steps:
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 17
        cache: maven

    - run: |
        export IMAGE_TAG=${GITHUB_SHA::7}
        envsubst < application.template > application.yaml
        mv application.yaml ./src/main/resources/
        cat ./src/main/resources/application.yaml
      shell: bash

    - run: ./mvnw clean package -DskipTests -Djar.name=app
      shell: bash

    - uses: actions/upload-artifact@v4
      with:
        name: service-build
        path: target/*.jar
        retention-days: 1
          
