name: Java setup

runs:
  using: "composite"
  steps:
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 17
        cache: maven

    - run: mvn clean package -DskipTests -Djar.name=app
      shell: bash

    - uses: actions/upload-artifact@v4
      with:
        name: service-build
        path: target/*.jar
        retention-days: 1
          
