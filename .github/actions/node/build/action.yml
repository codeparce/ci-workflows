# .github/workflows/node-build.yml
name: "Build Node Project"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 24

    - run: npm i
      shell: bash

    - run: npm run build
      shell: bash
      
    - uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: dist
        retention-days: 1
