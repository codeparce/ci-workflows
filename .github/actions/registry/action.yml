# .github/workflows/docker-build.yml
name: Docker publish 

inputs:
  container-access-token:
    description: 'El token para loguearse'
    required: true

runs:
  using: "composite"
  steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ inputs.container-access-token }} 

      - name: Build and tag Docker image
        shell: bash
        run: |
          export IMAGE_TAG=${GITHUB_SHA::7}
          echo "Building Docker image with tag: $IMAGE_TAG"
          docker build -t ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:$IMAGE_TAG .
          docker tag ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:$IMAGE_TAG  tag ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:$IMAGE_TAG 

      - name: Push Docker image
        shell: bash
        run: |
          export IMAGE_TAG=${GITHUB_SHA::7}
          docker push ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:$IMAGE_TAG