# .github/workflows/docker-build.yml
name: Docker publish 

inputs:
  docker-account-name:
    required: true
    type: string
  docker-access-token:
    required: true
    type: string

runs:
  using: "composite"
  steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ inputs.docker-account-name }}
          password: ${{ inputs.docker-access-token }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ inputs.docker-account-name }}/${{ github.event.repository.name }}:${{ github.ref_name }} .
        shell: bash

      - name: Push Docker image
        run: |
          docker push ${{ inputs.docker-account-name }}/${{ github.event.repository.name }}:${{ github.ref_name }}
        shell: bash