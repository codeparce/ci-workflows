# .github/workflows/node-build.yml
name: Deploy to Azure Arquitecture

on:
  workflow_call:

jobs:
  deploy-azure-static-web-app:
    runs-on: ubuntu-latest
    name: Static Web App

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Deploy SWA
        uses: codeparce/ci-workflows/.github/actions/azure/swa@v1
        with:
          artifact-path: dist
          config-path: secret