name: Fullstack Pipeline

on:
  workflow_call:
    inputs:
      cloud:
        required: true
        type: string


jobs:
  build:
    uses: ./.github/workflows/ci-build-node.yml
    with:
      doppler-project: vault-codeparce
    secrets: inherit

  infra:
    uses: ./.github/workflows/infra-az-swa.yml
    with:
      cloud: ${{ inputs.cloud }}
      tf-directory: 2-static-web-app
    secrets: inherit

  deploy:
    uses: ./.github/workflows/cd-az-swa.yml
    with:
      config-path: secret
      artifact-path: dist
    needs: [build, infra]
    secrets: inherit
