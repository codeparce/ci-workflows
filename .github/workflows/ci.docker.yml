# .github/workflows/docker-build.yml
name: Docker publish 

on:
  workflow_call:
    inputs:
      type:
        required: true
        type: string
      target:
        required: true
        type: string

jobs:
  docker-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
          
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.type }}
          path: ${{ inputs.target }}

      - name: Publish to Docker Hub
        uses: codeparce/ci-workflows/.github/actions/docker@v1
        with:
          docker-account-name: ${{ secrets.DOCKER_ACCOUNT_NAME }}
          docker-access-token: ${{ secrets.DOCKER_ACCESS_TOKEN }}