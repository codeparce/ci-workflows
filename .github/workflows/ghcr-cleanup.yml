name: Gihub Clear Image
on:
   workflow_call:
    secrets:
      CONTAINER_REGISTRY_PAT_GITHUB:
        required: true
jobs:
  img-clear:
    name: Images Clear
    timeout-minutes: 3
    runs-on: kubernetes # Runner on-premise
    steps:
      - uses: actions/checkout@v4

      - name: Debug
        run: |
          echo "repository_owner = ${{ github.repository_owner }}"
          echo "repository = ${{ github.repository }}"
          echo "repository_name = ${{ github.event.repository.name }}"

      - name: Actions for Clear images
        uses: codeparce/ci-workflows/.github/actions/github/clear@v1
        with:
          package-name: ${{ github.event.repository.name }}
          github-token: ${{ secrets.CONTAINER_REGISTRY_PAT_GITHUB }}
